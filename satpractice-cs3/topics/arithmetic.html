<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Arithmetic — SAT Planner</title>
    <link rel="stylesheet" href="../satmain.css">
    <style>
        :root { --bg-color: linear-gradient(#040404, #111); }
        .topic-hero { max-width: 900px; margin: 40px auto; padding: 24px; }
        .lessons-list { margin-top: 20px; display: grid; gap: 12px; }
        .lesson-item { background: rgba(255,255,255,0.06); padding: 14px; border-radius: 10px; }
        .back-link { display:inline-block; margin-top:16px; color:var(--primary-color); }
    </style>
</head>
<body>
    <div class="container topic-hero">
        <div class="section-header">
            <div class="section-title">Arithmetic</div>
            <div class="section-subtitle">Fundamentals: operations, fractions, ratios, and number properties.</div>
        </div>

        <div class="progress-card">
            <!-- <div class="lessons-list"></div> -->

            <a class="back-link" href="../satmain.html">← Back to Home</a>
        </div>
    </div>

    <script>
        const TOPIC_ID = 'arithmetic';
        const lessonsList = document.querySelector('.lessons-list');

        fetch('../data/questions.json')
            .then(r => r.json())
            .then(data => {
                const topicData = data[TOPIC_ID] || {};
                const lessons = Object.keys(topicData).sort((a, b) => parseInt(a) - parseInt(b));
                
                if (lessons.length === 0) {
                    lessonsList.innerHTML = '<p>No lessons available yet.</p>';
                    return;
                }

                lessons.forEach(lessonNum => {
                    const questions = topicData[lessonNum] || [];
                    const questionCount = questions.length;
                    const item = document.createElement('a');
                    item.href = `lesson.html?topic=${TOPIC_ID}&lesson=${lessonNum}`;
                    item.className = 'lesson-item';
                    item.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong>Lesson ${lessonNum}</strong>
                                <div style="font-size: 0.9em; color: var(--text-color); opacity: 0.7;">${questionCount} Questions</div>
                            </div>
                            <div style="color: var(--primary-color);">→</div>
                        </div>
                    `;
                    lessonsList.appendChild(item);
                });
            })
            .catch(err => {
                lessonsList.innerHTML = '<p>Could not load lessons.</p>';
                console.error(err);
            });
    </script>
