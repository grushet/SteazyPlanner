<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Grammar — SAT Planner</title>
    <link rel="stylesheet" href="../satmain.css">
    <style>
        :root { --bg-color: linear-gradient(#040404, #111); }
        .topic-hero { max-width: 900px; margin: 40px auto; padding: 24px; }
        .lessons-list { margin-top: 20px; display: grid; gap: 12px; }
        .lesson-item { background: rgba(255,255,255,0.06); padding: 14px; border-radius: 10px; }
        .lesson-item.disabled { opacity: 0.5; pointer-events: none; }
        .back-link { display:inline-block; margin-top:16px; color:var(--primary-color); }
    </style>
</head>
<body>
    <div class="container topic-hero">
        <div class="section-header">
            <div class="section-title">Grammar</div>
            <div class="section-subtitle">Punctuation, sentence structure, modifiers, and usage.</div>
        </div>

        <div class="progress-card">
            <div class="lessons-list"></div>

            <a class="back-link" href="../satmain.html#dashboard">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        const TOPIC_ID = 'grammar';
        const lessonsList = document.querySelector('.lessons-list');

        fetch('../data/questions.json')
            .then(r => r.json())
            .then(data => {
                const topicData = data[TOPIC_ID] || {};
                const maxLessons = 10; // ensure at least 10 lessons displayed

                for (let i = 1; i <= maxLessons; i++) {
                    const questions = topicData[i] || [];
                    const questionCount = questions.length;
                    const item = document.createElement('a');
                    item.href = questionCount
                        ? `lesson.html?topic=${TOPIC_ID}&lesson=${i}`
                        : '#';
                    item.className = 'lesson-item' + (questionCount ? '' : ' disabled');
                    item.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong>Lesson ${i}</strong>
                                <div style="font-size: 0.9em; color: var(--text-color); opacity: 0.7;">
                                    ${questionCount} Questions${questionCount === 0 ? ' (coming soon)' : ''}
                                </div>
                            </div>
                            <div style="color: var(--primary-color);">→</div>
                        </div>
                    `;
                    if (questionCount === 0) {
                        item.addEventListener('click', e => e.preventDefault());
                    }
                    lessonsList.appendChild(item);
                }
            })
            .catch(err => {
                lessonsList.innerHTML = '<p>Could not load lessons.</p>';
                console.error(err);
            });
    </script>
