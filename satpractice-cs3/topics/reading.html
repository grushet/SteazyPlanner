<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Reading — SAT Planner</title>
    <link rel="stylesheet" href="../satmain.css">
    <style>
        :root {
            --primary-color: #c77dff;
            --text-color: #ffffff;
        }

        .topic-hero {
            max-width: 900px;
            margin: 48px auto;
            padding: 0 24px 64px;
        }

        .lessons-list {
            margin-top: 8px;
            display: grid;
            gap: 10px;
        }

        .lesson-item {
            background: rgba(157, 78, 221, 0.06);
            border: 1px solid rgba(157, 78, 221, 0.18);
            border-radius: 12px;
            padding: 18px 22px;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .lesson-item:hover {
            background: rgba(157, 78, 221, 0.12);
            border-color: #9d4edd;
            transform: translateX(5px);
            box-shadow: 0 4px 20px rgba(157, 78, 221, 0.15);
        }

        .lesson-item.disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 22px;
            color: #9d4edd;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #c77dff;
        }
    </style>
</head>
<body>
    <div class="container topic-hero">
        <div class="section-header">
            <div class="section-title">Reading</div>
            <div class="section-subtitle">Passage analysis, inference, and main ideas.</div>
        </div>

        <div class="progress-card">
            <div class="lessons-list"></div>

            <a class="back-link" href="../satmain.html#dashboard">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        const TOPIC_ID = 'reading';
        const lessonsList = document.querySelector('.lessons-list');

        fetch('../data/questions.json')
            .then(r => r.json())
            .then(data => {
                const topicData = data[TOPIC_ID] || {};
                const maxLessons = 10; // ensure at least 10 lessons displayed

                for (let i = 1; i <= maxLessons; i++) {
                    const questions = topicData[i] || [];
                    const questionCount = questions.length;
                    const item = document.createElement('a');
                    item.href = questionCount
                        ? `lesson.html?topic=${TOPIC_ID}&lesson=${i}`
                        : '#';
                    item.className = 'lesson-item' + (questionCount ? '' : 'disabled');
                    item.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong>Lesson ${i}</strong>
                                <div style="font-size: 0.9em; color: var(--text-color); opacity: 0.7;">
                                    ${questionCount} Questions${questionCount === 0 ? ' (coming soon)' : ''}
                                </div>
                            </div>
                            <div style="color: var(--primary-color);">→</div>
                        </div>
                    `;
                    if (questionCount === 0) {
                        item.addEventListener('click', e => e.preventDefault());
                    }
                    lessonsList.appendChild(item);
                }
            })
            .catch(err => {
                lessonsList.innerHTML = '<p>Could not load lessons.</p>';
                console.error(err);
            });
    </script>
