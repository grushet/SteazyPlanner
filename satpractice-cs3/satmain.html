<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT Planner</title>
    <link rel="stylesheet" href="satmain.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">SAT Planner</div>
            <button class="settings-btn" id="settingsBtn">⚙</button>
        </div>
    </nav>

    <div class="settings-overlay" id="settingsOverlay"></div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <div class="settings-title">Settings</div>
            <button class="close-btn" id="closeBtn">×</button>
        </div>
        <div class="settings-section">
            <label class="settings-label">Theme</label>
            <div class="settings-options">
                <button class="option-btn active" data-theme="forest">Forest</button>
                <button class="option-btn" data-theme="black">Black</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <section class="hero">
            <div class="hero-content">
                <h1>Master the SAT</h1>
                <p>Learn at your own pace with structured lessons</p>
            </div>
        </section>

        <section class="topics-section">
            <h2>Topics</h2>
            <div class="topics-grid">
                <a href="topics/arithmetic.html" class="topic-card">
                    <div class="topic-icon">A</div>
                    <h3>Arithmetic</h3>
                    <p>24 Lessons</p>
                </a>
                <a href="topics/geometry.html" class="topic-card">
                    <div class="topic-icon">G</div>
                    <h3>Geometry</h3>
                    <p>18 Lessons</p>
                </a>
                <a href="topics/data-stats.html" class="topic-card">
                    <div class="topic-icon">D</div>
                    <h3>Data & Stats</h3>
                    <p>15 Lessons</p>
                </a>
                <a href="topics/grammar.html" class="topic-card">
                    <div class="topic-icon">Gr</div>
                    <h3>Grammar</h3>
                    <p>22 Lessons</p>
                </a>
                <a href="topics/reading.html" class="topic-card">
                    <div class="topic-icon">R</div>
                    <h3>Reading</h3>
                    <p>30 Lessons</p>
                </a>
                <a href="topics/vocabulary.html" class="topic-card">
                    <div class="topic-icon">V</div>
                    <h3>Vocabulary</h3>
                    <p>40 Lessons</p>
                </a>
            </div>
        </section>

        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCN8wH8WMmXtFSN8yFAVrizTS7IqLQzWKg",
            authDomain: "steazyplanner.firebaseapp.com",
            projectId: "steazyplanner",
            storageBucket: "steazyplanner.firebasestorage.app",
            messagingSenderId: "231639329077",
            appId: "1:231639329077:web:4242cb4d5f9ff81b9fc47c",
            measurementId: "G-7GWFDHKKER"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserUid = null;
        let currentTopics = []; // State variable to hold active topics data

        // Settings Panel
        const settingsBtn = document.getElementById('settingsBtn');
        const closeBtn = document.getElementById('closeBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const settingsOverlay = document.getElementById('settingsOverlay');

        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.add('open');
            settingsOverlay.classList.add('open');
        });

        closeBtn.addEventListener('click', () => {
            settingsPanel.classList.remove('open');
            settingsOverlay.classList.remove('open');
        });

        settingsOverlay.addEventListener('click', () => {
            settingsPanel.classList.remove('open');
            settingsOverlay.classList.remove('open');
        });

        // Theme system
        const THEME_KEY = 'satPlannerTheme';
        
        const themes = {
            forest: {
                bg: "linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://www.shutterstock.com/image-photo/dark-creepy-snow-cold-forest-600nw-1921136801.jpg') center/cover no-repeat fixed",
                textColor: '#e8eef2',
                primaryColor: '#80deea',
                secondaryColor: '#b3e5fc',
                navBg: 'rgba(0, 0, 0, 0.6)'
            },
            black: {
                bg: 'linear-gradient(135deg, #0a0a0a, #1a1a1a)',
                textColor: '#e8eef2',
                primaryColor: '#60a5fa',
                secondaryColor: '#3b82f6',
                navBg: 'rgba(0, 0, 0, 0.9)'
            }
        };

        function applyTheme(themeName) {
            const theme = themes[themeName] || themes.forest;
            document.documentElement.style.setProperty('--bg-color', theme.bg);
            document.documentElement.style.setProperty('--text-color', theme.textColor);
            document.documentElement.style.setProperty('--primary-color', theme.primaryColor);
            document.documentElement.style.setProperty('--secondary-color', theme.secondaryColor);
            localStorage.setItem(THEME_KEY, themeName);
        }

        // Load theme from localStorage
        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem(THEME_KEY) || 'forest';
            applyTheme(savedTheme);
            
            // Update active button
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-theme') === savedTheme) {
                    btn.classList.add('active');
                }
            });
        });

        // Theme button event listeners
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const themeName = btn.getAttribute('data-theme');
                applyTheme(themeName);
                
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Lesson/Topic progress system
        const defaultTopics = [
            { id: 'arithmetic', name: 'Arithmetic', progress: 28 },
            { id: 'geometry', name: 'Geometry', progress: 44 },
            { id: 'data-stats', name: 'Data & Stats', progress: 55 },
            { id: 'grammar', name: 'Grammar', progress: 22 },
            { id: 'reading', name: 'Reading', progress: 65 },
            { id: 'vocabulary', name: 'Vocabulary', progress: 72 }
        ];

        // Route Protection and Data Loading
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // If accessed directly without logging in, redirect to login page
                window.location.replace('../index.html');
            } else {
                currentUserUid = user.uid;
                await initLessonsFromFirestore();
            }
        });

        async function initLessonsFromFirestore() {
            try {
                const docRef = doc(db, "users", currentUserUid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists() && docSnap.data().satTopics && docSnap.data().satTopics.length > 0) {
                    const savedTopics = docSnap.data().satTopics;
                    // Merge saved progress with defaults to ensure structure is intact
                    const map = {};
                    savedTopics.forEach(t => map[t.id] = t);
                    currentTopics = defaultTopics.map(d => ({ ...d, ...(map[d.id] || {}) }));
                } else {
                    // No data exists yet, use default topics
                    currentTopics = defaultTopics.slice();
                }
            } catch (error) {
                console.error("Error fetching SAT topics:", error);
                currentTopics = defaultTopics.slice();
            }
            
            renderLessons(currentTopics);
        }

        async function saveTopicsToFirestore(topicsToSave) {
            if (!currentUserUid) return;
            
            const docRef = doc(db, "users", currentUserUid);
            try {
                await updateDoc(docRef, {
                    satTopics: topicsToSave
                });
            } catch (error) {
                console.error("Error saving SAT topics:", error);
            }
        }

        function renderLessons(topics) {
            const container = document.getElementById('lessonsGrid');
            if (!container) return; // Returns early if you keep the section commented out in HTML

            topics.forEach(t => t.importance = Math.max(0, 100 - (t.progress || 0)));
            topics.sort((a, b) => b.importance - a.importance);

            container.innerHTML = '';

            topics.forEach(topic => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.setAttribute('data-topic', topic.id);

                const size = Math.round(180 + topic.importance * 0.8);
                card.style.width = size + 'px';
                card.style.height = size + 'px';

                card.innerHTML = `
                    <div class="lesson-content">
                        <div class="lesson-title">${topic.name}</div>
                    </div>
                    <div class="lesson-overlay">
                        <div class="progress-label">${topic.progress}%</div>
                        <button class="practice-btn" data-topic="${topic.id}">Practice</button>
                    </div>
                `;

                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        const active = document.activeElement;
                        if (active && active.classList.contains('practice-btn')) {
                            active.click();
                        } else {
                            window.location.href = `topics/${topic.id}.html`;
                        }
                    }
                });

                card.addEventListener('click', (e) => {
                    const btn = e.target.closest('.practice-btn');
                    if (btn) return;
                    window.location.href = `topics/${topic.id}.html`;
                });

                container.appendChild(card);
            });

            container.querySelectorAll('.practice-btn').forEach(b => {
                b.addEventListener('click', async (ev) => {
                    ev.stopPropagation();
                    const id = b.getAttribute('data-topic');
                    await handlePractice(id);
                });
            });
        }

        async function handlePractice(topicId) {
            const t = currentTopics.find(x => x.id === topicId);
            if (!t) return;
            
            t.progress = Math.min(100, (t.progress || 0) + 2);
            
            // Re-render UI immediately for responsiveness
            renderLessons(currentTopics);
            
            // Save to database in the background
            await saveTopicsToFirestore(currentTopics);
        }
    </script>
</body>
</html>
